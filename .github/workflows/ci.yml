name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-gnu
          targets: x86_64-pc-windows-gnu
          components: rustfmt

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Add toolchains to PATH
        shell: pwsh
        run: |
          "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Format check
        shell: pwsh
        run: cargo fmt --check

      - name: Test Rust workspace
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\dev-cargo.ps1 test

      - name: Test Python bootstrap package
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\test-python-bootstrap.ps1 -PythonPath python

      - name: Build Windows release bundle
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-release-bundle.ps1

      - name: Build Winget manifests
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\build-winget-manifests.ps1 `
            -ReleaseBaseUrl https://example.invalid/releases/download/test `
            -OutputRoot .\packaging\winget

      - name: Build Python bootstrap package
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-python-bootstrap.ps1 -PythonPath python

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v6
        with:
          name: pyenv-native-windows-bundle
          path: |
            dist/pyenv-native-windows-x64.zip
            dist/pyenv-native-windows-x64.zip.sha256

      - name: Upload Winget manifests
        uses: actions/upload-artifact@v6
        with:
          name: pyenv-native-winget-manifests
          path: packaging/winget/manifests/**

      - name: Upload Python bootstrap package
        uses: actions/upload-artifact@v6
        with:
          name: pyenv-native-bootstrap-python
          path: python-package/dist/*

  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test Rust workspace
        shell: bash
        run: cargo test --workspace

      - name: Test Python bootstrap package
        shell: bash
        run: PYTHONPATH=./python-package/src python -m unittest discover -s ./python-package/tests -p "test_*.py"

      - name: Build Linux release bundle
        shell: bash
        run: sh ./scripts/build-release-bundle.sh --output-root ./dist

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v6
        with:
          name: pyenv-native-linux-bundle
          path: |
            dist/pyenv-native-linux-*.tar.gz
            dist/pyenv-native-linux-*.tar.gz.sha256

  macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test Rust workspace
        shell: bash
        run: cargo test --workspace

      - name: Test Python bootstrap package
        shell: bash
        run: PYTHONPATH=./python-package/src python -m unittest discover -s ./python-package/tests -p "test_*.py"

      - name: Build macOS release bundle
        shell: bash
        run: sh ./scripts/build-release-bundle.sh --output-root ./dist

      - name: Upload macOS bundle
        uses: actions/upload-artifact@v6
        with:
          name: pyenv-native-macos-bundle
          path: |
            dist/pyenv-native-macos-*.tar.gz
            dist/pyenv-native-macos-*.tar.gz.sha256
