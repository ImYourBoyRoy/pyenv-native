name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          
      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev libayatana-appindicator3-dev pkg-config

      - name: Format check
        shell: bash
        run: cargo fmt --check

      - name: Clippy
        shell: bash
        run: cargo clippy --workspace --exclude pyenv-gui -- -D warnings

      - name: Test Rust workspace
        shell: bash
        run: cargo test --workspace --exclude pyenv-gui

      - name: Test Python install package
        shell: bash
        run: PYTHONPATH=./python-package/src python -m unittest discover -s ./python-package/tests -p "test_*.py"

      - name: Build CLI for bash shell smoke test
        shell: bash
        run: cargo build -p pyenv-cli

      - name: Smoke test bash shell integration
        shell: bash
        run: bash ./scripts/smoke-shells.sh ./target/debug/pyenv

      - name: Build Linux release bundle smoke test
        shell: bash
        run: sh ./scripts/build-release-bundle.sh --output-root ./dist

  windows-x64:
    runs-on: windows-latest
    env:
      PYENV_WINDOWS_TARGET: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test Rust workspace
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\dev-cargo.ps1 test

      - name: Test Python install package
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\test-python-bootstrap.ps1 -PythonPath python

      - name: Build CLI for Windows shell smoke tests
        shell: pwsh
        run: cargo build -p pyenv-cli

      - name: Smoke test PowerShell and CMD integration
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\smoke-shells.ps1

      - name: Build Windows x64 release bundle smoke test
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-release-bundle.ps1 -TargetTriple x86_64-pc-windows-msvc

      - name: Build Winget manifests smoke test
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\build-winget-manifests.ps1 `
            -ReleaseBaseUrl https://example.invalid/releases/download/test `
            -OutputRoot .\packaging\winget

      - name: Build Python install package smoke test
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-python-bootstrap.ps1 -PythonPath python

  windows-arm64-smoke:
    runs-on: windows-latest
    env:
      PYENV_WINDOWS_TARGET: aarch64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: aarch64-pc-windows-msvc

      - name: Build Windows ARM64 release bundle smoke test
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-release-bundle.ps1 -TargetTriple aarch64-pc-windows-msvc

  linux-arm64-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install Cross
        run: cargo install cross --locked

      - name: Build Linux ARM64 release bundle smoke test
        shell: bash
        env:
          CARGO: cross
        run: |
          sh ./scripts/build-release-bundle.sh \
            --output-root ./dist \
            --target aarch64-unknown-linux-musl \
            --arch arm64

  android-arm64-smoke:
    runs-on: ubuntu-latest
    env:
      ANDROID_API_LEVEL: "21"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Android ARM64 release bundle smoke test
        shell: bash
        run: |
          sh ./scripts/build-release-bundle.sh \
            --output-root ./dist \
            --target aarch64-linux-android \
            --platform android \
            --arch arm64

  macos-arm64-smoke:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test Rust workspace
        shell: bash
        run: cargo test --workspace --exclude pyenv-gui

      - name: Test Python install package
        shell: bash
        run: PYTHONPATH=./python-package/src python -m unittest discover -s ./python-package/tests -p "test_*.py"

      - name: Build macOS arm64 release bundle smoke test
        shell: bash
        run: sh ./scripts/build-release-bundle.sh --output-root ./dist

  macos-x64-smoke:
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test Rust workspace
        shell: bash
        run: cargo test --workspace --exclude pyenv-gui

      - name: Test Python install package
        shell: bash
        run: PYTHONPATH=./python-package/src python -m unittest discover -s ./python-package/tests -p "test_*.py"

      - name: Build macOS x64 release bundle smoke test
        shell: bash
        run: sh ./scripts/build-release-bundle.sh --output-root ./dist
