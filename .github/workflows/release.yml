name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-x64-bundle:
    runs-on: windows-latest
    env:
      PYENV_WINDOWS_TARGET: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test Rust workspace
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\dev-cargo.ps1 test

      - name: Test Python install package
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\test-python-bootstrap.ps1 -PythonPath python

      - name: Build Windows x64 release bundle
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-release-bundle.ps1 -TargetTriple x86_64-pc-windows-msvc

      - name: Build Python install package
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-python-bootstrap.ps1 -PythonPath python

      - name: Upload Windows x64 bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: pyenv-native-windows-x64-bundle
          path: |
            dist/pyenv-native-windows-x64.zip
            dist/pyenv-native-windows-x64.zip.sha256

      - name: Upload Python install package artifact
        uses: actions/upload-artifact@v7
        with:
          name: pyenv-native-python-package
          path: python-package/dist/*

  windows-arm64-bundle:
    runs-on: windows-latest
    env:
      PYENV_WINDOWS_TARGET: aarch64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: aarch64-pc-windows-msvc

      - name: Build Windows ARM64 release bundle
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-release-bundle.ps1 -TargetTriple aarch64-pc-windows-msvc

      - name: Upload Windows ARM64 bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: pyenv-native-windows-arm64-bundle
          path: |
            dist/pyenv-native-windows-arm64.zip
            dist/pyenv-native-windows-arm64.zip.sha256

  linux-bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          
      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev libayatana-appindicator3-dev pkg-config

      - name: Test Rust workspace
        shell: bash
        run: cargo test --workspace --exclude pyenv-gui

      - name: Test Python install package
        shell: bash
        run: PYTHONPATH=./python-package/src python -m unittest discover -s ./python-package/tests -p "test_*.py"

      - name: Build Linux release bundle
        shell: bash
        run: sh ./scripts/build-release-bundle.sh --output-root ./dist

      - name: Upload Linux bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: pyenv-native-linux-bundle
          path: |
            dist/pyenv-native-linux-*.tar.gz
            dist/pyenv-native-linux-*.tar.gz.sha256

  linux-arm64-bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install Cross
        run: cargo install cross --locked

      - name: Build Linux ARM64 release bundle
        shell: bash
        env:
          CARGO: cross
        run: |
          sh ./scripts/build-release-bundle.sh \
            --output-root ./dist \
            --target aarch64-unknown-linux-musl \
            --arch arm64

      - name: Upload Linux ARM64 bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: pyenv-native-linux-arm64-bundle
          path: |
            dist/pyenv-native-linux-arm64.tar.gz
            dist/pyenv-native-linux-arm64.tar.gz.sha256

  android-arm64-bundle:
    runs-on: ubuntu-latest
    env:
      ANDROID_API_LEVEL: "21"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Android ARM64 release bundle
        shell: bash
        run: |
          sh ./scripts/build-release-bundle.sh \
            --output-root ./dist \
            --target aarch64-linux-android \
            --platform android \
            --arch arm64

      - name: Upload Android ARM64 bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: pyenv-native-android-arm64-bundle
          path: |
            dist/pyenv-native-android-arm64.tar.gz
            dist/pyenv-native-android-arm64.tar.gz.sha256

  macos-arm64-bundle:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test Rust workspace
        shell: bash
        run: cargo test --workspace --exclude pyenv-gui

      - name: Test Python install package
        shell: bash
        run: PYTHONPATH=./python-package/src python -m unittest discover -s ./python-package/tests -p "test_*.py"

      - name: Build macOS arm64 release bundle
        shell: bash
        run: sh ./scripts/build-release-bundle.sh --output-root ./dist

      - name: Upload macOS arm64 bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: pyenv-native-macos-arm64-bundle
          path: |
            dist/pyenv-native-macos-arm64.tar.gz
            dist/pyenv-native-macos-arm64.tar.gz.sha256

  macos-x64-bundle:
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test Rust workspace
        shell: bash
        run: cargo test --workspace --exclude pyenv-gui

      - name: Test Python install package
        shell: bash
        run: PYTHONPATH=./python-package/src python -m unittest discover -s ./python-package/tests -p "test_*.py"

      - name: Build macOS x64 release bundle
        shell: bash
        run: sh ./scripts/build-release-bundle.sh --output-root ./dist

      - name: Upload macOS x64 bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: pyenv-native-macos-x64-bundle
          path: |
            dist/pyenv-native-macos-x64.tar.gz
            dist/pyenv-native-macos-x64.tar.gz.sha256

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - windows-x64-bundle
      - windows-arm64-bundle
      - linux-bundle
      - linux-arm64-bundle
      - android-arm64-bundle
      - macos-arm64-bundle
      - macos-x64-bundle
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Windows x64 bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: pyenv-native-windows-x64-bundle
          path: dist/windows/x64

      - name: Download Windows ARM64 bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: pyenv-native-windows-arm64-bundle
          path: dist/windows/arm64

      - name: Download Linux bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: pyenv-native-linux-bundle
          path: dist/linux

      - name: Download Linux ARM64 bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: pyenv-native-linux-arm64-bundle
          path: dist/linux

      - name: Download Android ARM64 bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: pyenv-native-android-arm64-bundle
          path: dist/android

      - name: Download macOS arm64 bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: pyenv-native-macos-arm64-bundle
          path: dist/macos

      - name: Download macOS x64 bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: pyenv-native-macos-x64-bundle
          path: dist/macos

      - name: Download Python install package artifact
        uses: actions/download-artifact@v8
        with:
          name: pyenv-native-python-package
          path: dist/python

      - name: Generate Winget manifests
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          & ./scripts/build-winget-manifests.ps1 `
            -GitHubRepo $repo `
            -Tag $tag `
            -BundlePaths @('./dist/windows/x64/pyenv-native-windows-x64.zip', './dist/windows/arm64/pyenv-native-windows-arm64.zip') `
            -ChecksumPaths @('./dist/windows/x64/pyenv-native-windows-x64.zip.sha256', './dist/windows/arm64/pyenv-native-windows-arm64.zip.sha256') `
            -OutputRoot ./dist/winget

      - name: Generate Homebrew formula
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          & ./scripts/build-homebrew-formula.ps1 `
            -GitHubRepo $repo `
            -Tag $tag `
            -AssetRoots @('./dist/linux', './dist/macos') `
            -OutputPath ./dist/homebrew/pyenv-native.rb

      - name: Publish release assets
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            install.ps1
            install.sh
            uninstall.ps1
            uninstall.sh
            dist/windows/**
            dist/linux/**
            dist/android/**
            dist/macos/**
            dist/winget/**
            dist/homebrew/**
            dist/python/*

  publish-python:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - publish-release
      - windows-x64-bundle
    environment:
      name: pyenv-native
      url: https://pypi.org/p/pyenv-native
    permissions:
      id-token: write

    steps:
      - name: Download Python install package artifact
        uses: actions/download-artifact@v8
        with:
          name: pyenv-native-python-package
          path: dist

      - name: Publish to PyPI with trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
