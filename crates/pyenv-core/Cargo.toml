[package]
name = "pyenv-core"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
anyhow = "1.0.102"
bzip2 = "0.6.1"
flate2 = "1.1.9"
reqwest = { version = "0.13.2", default-features = false, features = ["blocking", "rustls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tar = "0.4.44"
thiserror = "2.0.18"
toml = "1.0.7"
zip = { version = "8.2.0", default-features = false, features = ["deflate"] }

[dev-dependencies]
mockito = "1.7.2"
tempfile = "3.27.0"
